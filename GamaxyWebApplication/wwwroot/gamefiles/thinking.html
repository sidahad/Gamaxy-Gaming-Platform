<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Nexus - The Ultimate Mind Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .game-container {
            width: 100%;
            height: 100vh;
            padding: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title {
            font-size: min(3.5rem, 8vw);
            font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #ffff00, #00ff00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: min(1.2rem, 4vw);
            color: #00f5ff;
            opacity: 0.8;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 5px;
            flex-shrink: 0;
        }

        .stat-card {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid #00f5ff;
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.2);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 80px;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 245, 255, 0.4);
        }

        .stat-value {
            font-size: min(2rem, 6vw);
            font-weight: 700;
            color: #00ff00;
        }

        .stat-label {
            font-size: min(0.9rem, 3vw);
            color: #00f5ff;
            margin-top: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid #00f5ff;
            flex-shrink: 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #ffff00);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 5px;
        }

        .game-modes-container {
            overflow-x: auto;
            white-space: nowrap;
            margin-bottom: 10px;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .game-modes-container::-webkit-scrollbar {
            display: none;
        }

        .game-modes {
            display: inline-flex;
            gap: 10px;
            padding-bottom: 5px;
        }

        .mode-card {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00f5ff;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            min-width: 150px;
            display: inline-block;
            white-space: normal;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            border-color: #ff00ff;
            box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3);
        }

        .mode-card.active {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .mode-title {
            font-size: min(1.2rem, 4vw);
            font-weight: 700;
            margin-bottom: 5px;
            color: #00f5ff;
        }

        .mode-description {
            font-size: min(0.8rem, 3vw);
            color: #ccc;
            line-height: 1.2;
        }

        .game-board-container {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-board {
            display: grid;
            gap: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 245, 255, 0.3);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1;
        }

        .game-cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #00f5ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(1.5rem, 4vw);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .game-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .game-cell:hover::before {
            left: 100%;
        }

        .game-cell:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 245, 255, 0.5);
            border-color: #ff00ff;
        }

        .game-cell.active {
            background: linear-gradient(135deg, #ff00ff, #00f5ff);
            animation: pulse 1s ease infinite;
        }

        .game-cell.correct {
            background: linear-gradient(135deg, #00ff00, #00f5ff);
            animation: correctFlash 0.5s ease;
        }

        .game-cell.wrong {
            background: linear-gradient(135deg, #ff0000, #ff6600);
            animation: wrongShake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes correctFlash {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px #00ff00;
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongShake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 20px;
            font-size: min(1rem, 4vw);
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            flex: 1;
            min-width: 100px;
            max-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff6600, #ffff00);
            color: #000;
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff0000, #ff6600);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .achievement {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(45deg, #00ff00, #00f5ff);
            color: #000;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: min(0.9rem, 4vw);
            transform: translateX(200px);
            transition: transform 0.5s ease;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.5);
            max-width: 80%;
        }

        .achievement.show {
            transform: translateX(0);
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00f5ff;
            border-radius: 50%;
            pointer-events: none;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-50px) rotate(180deg);
                opacity: 0.5;
            }
        }

        @media (orientation: portrait) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(4, 1fr);
                width: 90vmin;
                height: 90vmin;
            }
        }

        @media (orientation: landscape) {
            .game-board {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(6, 1fr);
                width: 90vmin;
                height: 90vmin;
            }
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(4, 1fr);
                width: 90vmin;
                height: 90vmin;
            }
            
            .controls {
                gap: 5px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: min(0.8rem, 3.5vw);
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">QUANTUM NEXUS</h1>
            <p class="subtitle">The Ultimate Mind-Bending Challenge</p>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="time">60</div>
                <div class="stat-label">Time</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="game-modes-container">
            <div class="game-modes">
                <div class="mode-card active" data-mode="memory">
                    <div class="mode-title">🧠 Memory Matrix</div>
                    <div class="mode-description">Remember the sequence and repeat it</div>
                </div>
                <div class="mode-card" data-mode="reflex">
                    <div class="mode-title">⚡ Lightning Reflex</div>
                    <div class="mode-description">Click the glowing cells fast</div>
                </div>
                <div class="mode-card" data-mode="pattern">
                    <div class="mode-title">🔮 Pattern Master</div>
                    <div class="mode-description">Solve mathematical patterns</div>
                </div>
                <div class="mode-card" data-mode="chaos">
                    <div class="mode-title">🌪️ Chaos Mode</div>
                    <div class="mode-description">All modes combined</div>
                </div>
            </div>
        </div>

        <div class="game-board-container">
            <div class="game-board" id="gameBoard"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start</button>
            <button class="btn btn-secondary" id="pauseBtn">Pause</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
        </div>
    </div>

    <div class="achievement" id="achievement"></div>

    <script>
        class QuantumNexus {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.streak = 0;
                this.timeLeft = 60;
                this.gameMode = 'memory';
                this.isPlaying = false;
                this.isPaused = false;
                this.sequence = [];
                this.playerSequence = [];
                this.currentStep = 0;
                this.gameTimer = null;
                this.sequenceTimer = null;
                this.reflexTargets = [];
                this.patterns = [];

                this.initializeGame();
                this.bindEvents();
                this.createParticles();
            }

            initializeGame() {
                this.createGameBoard();
                this.updateDisplay();
            }

            createGameBoard() {
                const board = document.getElementById('gameBoard');
                board.innerHTML = '';

                const isPortrait = window.innerHeight > window.innerWidth;
                const cellCount = isPortrait ? 16 : 36;

                for (let i = 0; i < cellCount; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'game-cell';
                    cell.dataset.index = i;
                    cell.addEventListener('click', () => this.handleCellClick(i));
                    board.appendChild(cell);
                }
            }

            bindEvents() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pauseGame());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());

                document.querySelectorAll('.mode-card').forEach(card => {
                    card.addEventListener('click', () => this.selectMode(card.dataset.mode));
                });

                window.addEventListener('resize', () => {
                    if (!this.isPlaying) {
                        this.createGameBoard();
                    }
                });
            }

            selectMode(mode) {
                document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('active'));
                document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
                this.gameMode = mode;
                this.resetGame();
            }

            startGame() {
                if (this.isPaused) {
                    this.isPaused = false;
                    this.startTimer();
                    return;
                }

                this.isPlaying = true;
                this.timeLeft = 60;
                this.startTimer();

                switch (this.gameMode) {
                    case 'memory':
                        this.startMemoryGame();
                        break;
                    case 'reflex':
                        this.startReflexGame();
                        break;
                    case 'pattern':
                        this.startPatternGame();
                        break;
                    case 'chaos':
                        this.startChaosMode();
                        break;
                }

                this.updateDisplay();
            }

            startMemoryGame() {
                this.sequence = [];
                this.playerSequence = [];
                this.currentStep = 0;
                this.generateSequence();
                this.showSequence();
            }

            generateSequence() {
                const cells = document.querySelectorAll('.game-cell');
                const sequenceLength = Math.min(3 + this.level, cells.length);
                this.sequence = [];
                for (let i = 0; i < sequenceLength; i++) {
                    this.sequence.push(Math.floor(Math.random() * cells.length));
                }
            }

            showSequence() {
                let index = 0;
                const showNext = () => {
                    if (index < this.sequence.length) {
                        const cell = document.querySelector(`[data-index="${this.sequence[index]}"]`);
                        cell.classList.add('active');

                        setTimeout(() => {
                            cell.classList.remove('active');
                            index++;
                            setTimeout(showNext, 300);
                        }, 600);
                    }
                };
                showNext();
            }

            startReflexGame() {
                this.reflexTargets = [];
                this.spawnReflexTarget();
            }

            spawnReflexTarget() {
                if (!this.isPlaying || this.isPaused) return;

                const cells = document.querySelectorAll('.game-cell');
                const randomCell = Math.floor(Math.random() * cells.length);
                const cell = document.querySelector(`[data-index="${randomCell}"]`);
                cell.classList.add('active');

                this.reflexTargets.push({
                    index: randomCell,
                    timestamp: Date.now()
                });

                setTimeout(() => {
                    cell.classList.remove('active');
                    this.reflexTargets = this.reflexTargets.filter(target => target.index !== randomCell);
                }, 1500);

                setTimeout(() => this.spawnReflexTarget(), Math.random() * 1000 + 500);
            }

            startPatternGame() {
                this.generatePattern();
                this.displayPattern();
            }

            generatePattern() {
                this.patterns = [];
                const patternType = Math.floor(Math.random() * 3);

                switch (patternType) {
                    case 0: // Fibonacci
                        this.patterns = [1, 1, 2, 3, 5, 8, 13, 21];
                        break;
                    case 1: // Prime numbers
                        this.patterns = [2, 3, 5, 7, 11, 13, 17, 19];
                        break;
                    case 2: // Squares
                        this.patterns = [1, 4, 9, 16, 25, 36, 49, 64];
                        break;
                }
            }

            displayPattern() {
                const cells = document.querySelectorAll('.game-cell');
                cells.forEach((cell, index) => {
                    if (index < this.patterns.length - 1) {
                        cell.textContent = this.patterns[index];
                        cell.style.color = '#00f5ff';
                    } else if (index === this.patterns.length - 1) {
                        cell.textContent = '?';
                        cell.style.color = '#ff00ff';
                        cell.dataset.answer = this.patterns[index];
                    } else {
                        cell.textContent = '';
                    }
                });
            }

            startChaosMode() {
                const modes = ['memory', 'reflex', 'pattern'];
                const randomMode = modes[Math.floor(Math.random() * modes.length)];

                switch (randomMode) {
                    case 'memory':
                        this.startMemoryGame();
                        break;
                    case 'reflex':
                        this.startReflexGame();
                        break;
                    case 'pattern':
                        this.startPatternGame();
                        break;
                }

                setTimeout(() => {
                    if (this.isPlaying) this.startChaosMode();
                }, 10000);
            }

            handleCellClick(index) {
                if (!this.isPlaying || this.isPaused) return;

                const cell = document.querySelector(`[data-index="${index}"]`);

                switch (this.gameMode) {
                    case 'memory':
                        this.handleMemoryClick(index, cell);
                        break;
                    case 'reflex':
                        this.handleReflexClick(index, cell);
                        break;
                    case 'pattern':
                        this.handlePatternClick(index, cell);
                        break;
                    case 'chaos':
                        this.handleChaosClick(index, cell);
                        break;
                }
            }

            handleMemoryClick(index, cell) {
                if (this.sequence[this.currentStep] === index) {
                    cell.classList.add('correct');
                    setTimeout(() => cell.classList.remove('correct'), 500);

                    this.currentStep++;
                    this.addScore(10);
                    this.streak++;

                    if (this.currentStep >= this.sequence.length) {
                        this.levelUp();
                        setTimeout(() => this.startMemoryGame(), 1000);
                    }
                } else {
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 500);
                    this.streak = 0;
                    this.addScore(-5);
                }

                this.updateDisplay();
            }

            handleReflexClick(index, cell) {
                const target = this.reflexTargets.find(t => t.index === index);
                if (target) {
                    const reactionTime = Date.now() - target.timestamp;
                    const points = Math.max(50 - Math.floor(reactionTime / 10), 10);

                    cell.classList.add('correct');
                    setTimeout(() => cell.classList.remove('correct'), 300);

                    this.addScore(points);
                    this.streak++;
                    this.reflexTargets = this.reflexTargets.filter(t => t.index !== index);

                    if (this.streak % 10 === 0) this.levelUp();
                } else {
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 300);
                    this.streak = 0;
                    this.addScore(-10);
                }

                this.updateDisplay();
            }

            handlePatternClick(index, cell) {
                if (cell.dataset.answer) {
                    const userInput = prompt('What number completes the pattern?');
                    if (parseInt(userInput) === parseInt(cell.dataset.answer)) {
                        cell.classList.add('correct');
                        cell.textContent = cell.dataset.answer;
                        this.addScore(100);
                        this.streak++;
                        this.levelUp();
                        setTimeout(() => this.startPatternGame(), 1500);
                    } else {
                        cell.classList.add('wrong');
                        setTimeout(() => cell.classList.remove('wrong'), 500);
                        this.streak = 0;
                        this.addScore(-20);
                    }
                }

                this.updateDisplay();
            }

            handleChaosClick(index, cell) {
                if (this.sequence.length > 0) {
                    this.handleMemoryClick(index, cell);
                } else if (this.reflexTargets.length > 0) {
                    this.handleReflexClick(index, cell);
                } else if (this.patterns.length > 0) {
                    this.handlePatternClick(index, cell);
                }
            }

            addScore(points) {
                this.score += points;
                if (this.score < 0) this.score = 0;

                if (points > 0 && this.streak > 0 && this.streak % 5 === 0) {
                    this.showAchievement(`🔥 ${this.streak} Streak Bonus! +${this.streak * 5} points`);
                    this.score += this.streak * 5;
                }
            }

            levelUp() {
                this.level++;
                this.timeLeft += 10;
                this.showAchievement(`🎉 Level ${this.level} Reached!`);
            }

            showAchievement(text) {
                const achievement = document.getElementById('achievement');
                achievement.textContent = text;
                achievement.classList.add('show');

                setTimeout(() => {
                    achievement.classList.remove('show');
                }, 3000);
            }

            startTimer() {
                this.gameTimer = setInterval(() => {
                    if (!this.isPaused) {
                        this.timeLeft--;
                        this.updateDisplay();

                        if (this.timeLeft <= 0) {
                            this.endGame();
                        }
                    }
                }, 1000);
            }

            pauseGame() {
                this.isPaused = !this.isPaused;
                document.getElementById('pauseBtn').textContent = this.isPaused ? 'Resume' : 'Pause';
            }

            resetGame() {
                this.isPlaying = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.streak = 0;
                this.timeLeft = 60;
                this.sequence = [];
                this.playerSequence = [];
                this.currentStep = 0;
                this.reflexTargets = [];
                this.patterns = [];

                if (this.gameTimer) clearInterval(this.gameTimer);
                if (this.sequenceTimer) clearInterval(this.sequenceTimer);

                document.getElementById('pauseBtn').textContent = 'Pause';
                this.createGameBoard();
                this.updateDisplay();
            }

            endGame() {
                this.isPlaying = false;
                if (this.gameTimer) clearInterval(this.gameTimer);

                this.showAchievement(`🏆 Game Over! Final Score: ${this.score}`);

                setTimeout(() => {
                    if (confirm(`Amazing! You scored ${this.score} points and reached level ${this.level}!\n\nWould you like to play again?`)) {
                        this.resetGame();
                    }
                }, 1000);
            }

            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('streak').textContent = this.streak;
                document.getElementById('time').textContent = this.timeLeft;

                const progress = ((60 - this.timeLeft) / 60) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
            }

            createParticles() {
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        particle.style.left = Math.random() * 100 + '%';
                        particle.style.top = Math.random() * 100 + '%';
                        particle.style.animationDelay = Math.random() * 3 + 's';
                        particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                        document.body.appendChild(particle);

                        setTimeout(() => {
                            particle.remove();
                        }, 5000);
                    }, i * 200);
                }

                setTimeout(() => this.createParticles(), 10000);
            }
        }

        // Initialize the game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new QuantumNexus();
        });
    </script>
</body>
</html>
