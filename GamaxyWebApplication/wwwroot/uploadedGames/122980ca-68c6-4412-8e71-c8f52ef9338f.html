  new THREE.BoxGeometry(2.2, 0.4, 0.1),
  new THREE.MeshStandardMaterial({ 
    color: 0x111111, 
    transparent: true, 
    opacity: 0.5, 
    metalness: 0.9, 
    roughness: 0.1 
  })
);
rearWindow.position.set(0, 0.8, -0.6);
rearWindow.rotation.x = 0.3;
carBody.add(rearWindow);
const taillightLeft = new THREE.PointLight(0xff0000, 5, 10);
taillightLeft.position.set(-1, 0.6, -2.8);
taillightLeft.castShadow = false;
carBody.add(taillightLeft);
const taillightRight = new THREE.PointLight(0xff0000, 5, 10);
taillightRight.position.set(1, 0.6, -2.8);
taillightRight.castShadow = false;
carBody.add(taillightRight);
const nitroFlame = new THREE.Mesh(
  new THREE.ConeGeometry(0.6, 2.5, 16),
  new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.7 })
);
nitroFlame.position.set(0, 0.5, -3.5);
nitroFlame.rotation.x = Math.PI / 2;
nitroFlame.visible = false;
carBody.add(nitroFlame);
const wheels = [];
for (let i = 0; i < 4; i++) {
  const wheel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.25, 16),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  wheel.rotation.z = Math.PI / 2;
  wheel.position.set(
    (i % 2 === 0 ? 1.2 : -1.2),
    0.25,
    (i < 2 ? 1.8 : -1.8)
  );
  carBody.add(wheel);
  wheels.push(wheel);
}
carBody.userData = { x: 0, z: 0, speed: 0, acceleration: 0, targetSpeed: 0, finished: false, place: null, name: "Sid", crashCooldown: 0 };
carBody.position.set(0, 0.5, 0);
carBody.rotation.y = 0;
scene.add(carBody);
const minimapCar = new THREE.Mesh(
  new THREE.BoxGeometry(2.5, 1, 5),
  new THREE.MeshBasicMaterial({ color: 0xff3333 })
);
minimapScene.add(minimapCar);
camera.position.set(carBody.position.x, 3, carBody.position.z - 10);
camera.lookAt(carBody.position.x, 0, carBody.position.z + 20);
let keys = { KeyW: false, KeyS: false, ArrowLeft: false, ArrowRight: false, Space: false, Escape: false };
document.addEventListener('keydown', e => { 
  keys[e.code] = true;
  if (e.code === 'Escape' && !gameOver) {
    console.log("ESC pressed, calling toggleControlsMenu");
    toggleControlsMenu();
  }
});
document.addEventListener('keyup', e => { 
  keys[e.code] = false; 
});
let maxSpeed = 250,
    nitroSpeed = 350,
    accelerationRate = 2.0,
    decelerationRate = 1.5,
    friction = 0.95,
    steerSpeed = 3.0,
    nitro = 100,
    raceTime = 0,
    position = 1,
    gameOver = false,
    gamePaused = false,
    cameraShake = 0,
    lastFrameTime = performance.now(),
    finishOrder = [],
    raceStarted = false,
    animationFrameId = null;
const raceTimeDisplay = document.getElementById('raceTime');
const positionDisplay = document.getElementById('position');
const nitroDisplay = document.getElementById('nitro');
const nitroFill = document.getElementById('nitroFill');
const tachoDisplay = document.getElementById('tacho');
const messageDisplay = document.getElementById('message');
const countdownDisplay = document.getElementById('countdown');
const controlsButton = document.getElementById('controlsButton');
const controlsMenu = document.getElementById('controlsMenu');
const pauseButton = document.getElementById('pauseButton');
const restartButtonMenu = document.getElementById('restartButtonMenu');
function updatePosition(car) {
  car.position.x += (car.userData.x - car.position.x) * 0.5;
  car.position.z += (car.userData.z - car.position.z) * 0.1;
  if (car.userData.minimapClone) {
    car.userData.minimapClone.position.set(car.position.x, 0.5, car.position.z * 0.01);
    car.userData.minimapClone.rotation.copy(car.rotation);
  }
}
function toggleControlsMenu() {
  if (gameOver) return;
  gamePaused = !gamePaused;
  controlsMenu.style.display = gamePaused ? 'block' : 'none';
  controlsButton.style.display = gamePaused ? 'none' : 'block';
  pauseButton.textContent = gamePaused ? 'Resume' : 'Pause';
  console.log("Toggled controls menu, gamePaused:", gamePaused);
  if (gamePaused) {
    if (engineSound) {
      engineSound.gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    }
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }
  } else {
    if (engineSound) {
      engineSound.gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
    }
    if (raceStarted && !gameOver) {
      lastFrameTime = performance.now();
      animate();
    }
  }
}
controlsButton.addEventListener('click', () => {
  console.log("Controls button clicked");
  toggleControlsMenu();
});
pauseButton.addEventListener('click', () => {
  console.log("Pause/Resume button clicked");
  toggleControlsMenu();
});
restartButtonMenu.addEventListener('click', () => {
  console.log("Restart button in menu clicked");
  gamePaused = false;
  controlsMenu.style.display = 'none';
  controlsButton.style.display = 'block';
  pauseButton.textContent = 'Pause';
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
  resetGame();
});
function startCountdown() {
  countdownDisplay.style.display = 'block';
  let countdownTimer = 3;
  const interval = setInterval(() => {
    countdownDisplay.textContent = countdownTimer || 'Go!';
    countdownTimer--;
    if (countdownTimer < 0) {
      clearInterval(interval);
      countdownDisplay.style.display = 'none';
      raceStarted = true;
      carBody.userData.targetSpeed = maxSpeed;
      initAudio();
      animate();
    }
  }, 1000);
}
function updateOpponents() {
  opponents.forEach(o => {
    if (raceStarted && !o.userData.finished) {
      o.userData.targetSpeed = Math.min(o.userData.speed, maxSpeed + 20 + Math.random() * 80);
      o.userData.speed += (o.userData.targetSpeed - o.userData.speed) * o.userData.acceleration * 0.02;
      o.userData.speed *= friction;
      o.userData.z += o.userData.speed * 0.02;
      o.userData.laneChangeTimer--;
      if (o.userData.laneChangeTimer <= 0 && Math.random() < 0.05) {
        const nearbyCars = [...opponents, carBody].filter(c => c !== o && Math.abs(c.userData.z - o.userData.z) < 20);
        const playerAhead = carBody.userData.z > o.userData.z && Math.abs(carBody.userData.z - o.userData.z) < 30;
        const canOvertake = !nearbyCars.some(c => Math.abs(c.userData.x - o.userData.x) < 4 && Math.abs(c.userData.z - o.userData.z) < 15);
        if (canOvertake || playerAhead) {
          const laneOptions = [-2, -1, 0, 1, 2].filter(l => Math.abs(l - o.userData.lane) <= 1);
          o.userData.targetLane = laneOptions[Math.floor(Math.random() * laneOptions.length)];
        }
      }
      if (o.userData.targetLane !== null) {
        o.userData.lane += (o.userData.targetLane - o.userData.lane) * 0.05;
        if (Math.abs(o.userData.lane - o.userData.targetLane) < 0.1) {
          o.userData.targetLane = null;
          o.userData.laneChangeTimer = 20 + Math.random() * 40;
        }
      }
      o.userData.x = o.userData.lane * 3;
      o.userData.x = Math.max(-trackWidth + 2, Math.min(trackWidth - 2, o.userData.x));
      updatePosition(o);
      if (o.userData.z >= trackLength && !o.userData.finished) {
        o.userData.finished = true;
        o.userData.place = finishOrder.length + 1;
        finishOrder.push(o);
        if (finishOrder.length === 5) {
          endRace();
        }
      }
    }
  });
}
function updateRacePosition() {
  const allCars = [...opponents, carBody].filter(car => !car.userData.finished);
  allCars.sort((a, b) => b.userData.z - a.userData.z);
  position = allCars.indexOf(carBody) + 1 + finishOrder.length;
  positionDisplay.textContent = `${position}/${5}`;
}
function endRace() {
  gameOver = true;
  if (carBody.userData.finished && carBody.userData.place === 1) {
    const remainingBots = opponents
      .filter(o => !o.userData.finished)
      .sort((a, b) => b.userData.z - a.userData.z);
    let nextPlace = 2;
    remainingBots.forEach(bot => {
      if (!bot.userData.finished) {
        bot.userData.finished = true;
        bot.userData.place = nextPlace++;
        finishOrder.push(bot);
      }
    });
  }
  const standings = finishOrder.map((car, index) => {
    const place = ['1st', '2nd', '3rd', '4th', '5th'][index] || `${index + 1}th`;
    return `${place}. ${car.userData.name}`;
  });
  if (!carBody.userData.finished) {
    carBody.userData.place = finishOrder.length + 1;
    standings.push(`${carBody.userData.place}th. Sid`);
  }
  messageDisplay.innerHTML = `Race Complete!\n${standings.join('\n')}\nTime: ${formatTime(raceTime)}\n<button id="restartButton">Restart</button>`;
  messageDisplay.style.display = 'block';
  const restartButton = document.getElementById('restartButton');
  restartButton.addEventListener('click', () => {
    console.log("Restart button in race results clicked");
    messageDisplay.style.display = 'none';
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }
    resetGame();
  });
  if (engineSound) {
    engineSound.gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  }
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
}
function formatTime(seconds) {
  const minutes = Math.floor(seconds / 60);
  const secs = (seconds % 60).toFixed(1);
  return `${minutes}:${secs.padStart(4, '0')}`;
}
function animate() {
  if (gameOver || gamePaused) {
    animationFrameId = null;
    return;
  }
  const now = performance.now();
  if (now - lastFrameTime < 16.67) {
    animationFrameId = requestAnimationFrame(animate);
    return;
  }
  lastFrameTime = now;
  if (!raceStarted) {
    animationFrameId = null;
    return;
  }
  raceTime += 1 / 60;
  const isNitroActive = keys.Space && nitro > 0 && !carBody.userData.finished && carBody.userData.crashCooldown <= 0;
  carBody.userData.targetSpeed = keys.KeyW ? maxSpeed : keys.KeyS ? 0 : 0;
  if (isNitroActive) {
    carBody.userData.targetSpeed = nitroSpeed;
    nitro -= 2.0;
    headlightBeam.intensity = 2.5;
    nitroFlame.visible = true;
    if (nitroSound) {
      nitroSound.gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    }
    cameraShake = 0.15;
  } else {
    headlightBeam.intensity = 2;
    nitroFlame.visible = false;
    if (nitroSound) {
      nitroSound.gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    }
    cameraShake = 0;
  }
  carBody.userData.acceleration = (carBody.userData.targetSpeed - carBody.userData.speed) * accelerationRate * 0.02;
  carBody.userData.speed += carBody.userData.acceleration;
  if (!keys.KeyW && !keys.KeyS && !isNitroActive) {
    carBody.userData.speed *= 0.9;
  }
  if (carBody.userData.speed < 0) carBody.userData.speed = 0;
  if (carBody.userData.speed > maxSpeed) carBody.userData.speed = maxSpeed;
  raceTimeDisplay.textContent = formatTime(raceTime);
  nitroDisplay.textContent = Math.floor(nitro) + '%';
  nitroFill.style.width = nitro + '%';
  tachoDisplay.textContent = Math.floor(carBody.userData.speed);
  document.getElementById('digitalSpeed').textContent = Math.floor(carBody.userData.speed);
  if (engineSound) {
    engineSound.oscillator.frequency.setValueAtTime(100 + carBody.userData.speed * 1.5, audioCtx.currentTime);
  }
  if (!carBody.userData.finished) {
    if (carBody.userData.crashCooldown > 0) {
      carBody.userData.crashCooldown -= 1 / 60;
      carBody.userData.speed *= 0.9;
    } else {
      const steer = (keys.ArrowLeft ? 1 : keys.ArrowRight ? -1 : 0) * 0.5;
      carBody.userData.x += steer;
      carBody.userData.x = Math.max(-trackWidth + 2.5, Math.min(trackWidth - 2.5, carBody.userData.x));
      carBody.userData.z += carBody.userData.speed * 0.02;
    }
    updatePosition(carBody);
  }
  wheels.forEach(wheel => {
    wheel.rotation.x += carBody.userData.speed * 0.05;
    if (wheel.position.x > 0 && wheel.position.z > 0) {
      wheel.rotation.y = (keys.ArrowLeft ? 1 : keys.ArrowRight ? -1 : 0) * 0.4;
    }
  });
  updateOpponents();
  updateRacePosition();
  if (!carBody.userData.finished && carBody.userData.z >= trackLength) {
    carBody.userData.finished = true;
    carBody.userData.place = finishOrder.length + 1;
    finishOrder.push(carBody);
    positionDisplay.textContent = `${carBody.userData.place}st`;
    carBody.userData.speed = 0;
    if (carBody.userData.place === 1) {
      endRace();
    } else if (finishOrder.length === 5) {
      endRace();
    }
  }
  for (let o of opponents) {
    if (!o.position || o.userData.finished || carBody.userData.finished) continue;
    const dx = carBody.position.x - o.position.x;
    const dz = carBody.position.z - o.position.z;
    const distance = Math.sqrt(dx * dx + dz * dz);
    if (distance < 2.0) {
      carBody.userData.crashCooldown = 1.0;
      carBody.userData.speed *= 0.7;
      nitro = Math.max(0, nitro - 20);
      o.userData.speed *= 0.7;
      const pushFactor = 0.3;
      const pushX = dx / distance * pushFactor;
      const pushZ = dz / distance * pushFactor;
      carBody.userData.x += pushX;
      carBody.userData.z += pushZ;
      o.userData.x -= pushX;
      o.userData.z -= pushZ;
      carBody.userData.x = Math.max(-trackWidth + 2.5, Math.min(trackWidth - 2.5, carBody.userData.x));
      o.userData.x = Math.max(-trackWidth + 2, Math.min(trackWidth - 2, o.userData.x));
    }
  }
  const shakeX = cameraShake * (Math.random() - 0.5);
  const shakeY = cameraShake * (Math.random() - 0.5);
  camera.position.set(carBody.position.x + shakeX, carBody.position.y + 3 + shakeY, carBody.position.z - 10);
  camera.lookAt(carBody.position.x, 0, carBody.position.z + 20);
  minimapCar.position.set(carBody.position.x, 0.5, carBody.position.z * 0.01);
  minimapCar.rotation.copy(carBody.rotation);
  opponents.forEach(o => {
    if (o.userData.minimapClone) {
      o.userData.minimapClone.position.set(o.position.x, 0.5, o.position.z * 0.01);
    }
  });
  const distanceToFinish = Math.max(0, trackLength - carBody.userData.z).toFixed(0);
  distanceText.textContent = `Distance to Finish: ${distanceToFinish}m`;
  minimapCamera.position.set(carBody.position.x, 40, carBody.position.z * 0.01);
  minimapCamera.lookAt(carBody.position.x, 0, trackLength * 0.01);
  minimapRenderer.render(minimapScene, minimapCamera);
  drawSpeedometer(carBody.userData.speed);
  renderer.render(scene, camera);
  animationFrameId = requestAnimationFrame(animate);
}
function resetGame() {
  messageDisplay.style.display = 'none';
  carBody.userData = { x: 0, z: 0, speed: 0, acceleration: 0, targetSpeed: 0, finished: false, place: null, name: "Sid", crashCooldown: 0 };
  carBody.position.set(0, 0.5, 0);
  carBody.rotation.y = 0;
  raceTime = 0;
  nitro = 100;
  cameraShake = 0;
  raceStarted = false;
  position = 1;
  finishOrder = [];
  gamePaused = false;
  gameOver = false;
  controlsMenu.style.display = 'none';
  controlsButton.style.display = 'block';
  pauseButton.textContent = 'Pause';
  opponents.forEach(o => {
    scene.remove(o);
    if (o.userData.minimapClone) {
      minimapScene.remove(o.userData.minimapClone);
    }
  });
  opponents.length = 0;
  for (let i = 0; i < 4; i++) {
    createOpponent(i);
  }
  if (engineSound) {
    engineSound.oscillator.stop();
    engineSound = null;
  }
  if (nitroSound) {
    nitroSound.oscillator.stop();
    nitroSound = null;
  }
  audioCtx.resume().then(() => {
    engineSound = createEngineSound();
    nitroSound = createNitroSound();
  }).catch(err => {
    console.error("Failed to reinitialize audio:", err);
  });
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
  startCountdown();
}
Number.prototype.padStart = function(size, char = '0') {
  let s = String(this);
  while (s.length < size) s = char + s;
  return s;
};
startCountdown();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
const speedometerCanvas = document.getElementById('speedometer');
const ctx = speedometerCanvas.getContext('2d');
function drawSpeedometer(speed) {
  ctx.clearRect(0, 0, 200, 200);
  ctx.beginPath();
  ctx.arc(100, 100, 90, 0, Math.PI * 2);
  ctx.strokeStyle = '#00ffcc';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(100, 100, 80, -Math.PI / 2, -Math.PI / 2 + (speed / 350) * Math.PI * 1.5, false);
  ctx.lineWidth = 10;
  ctx.strokeStyle = 'rgba(255, 0, 255, 0.7)';
  ctx.stroke();
  ctx.fillStyle = '#ff00ff';
  ctx.font = '30px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(speed)}`, 100, 110);
  ctx.font = '20px Orbitron';
  ctx.fillText('km/h', 100, 130);
}
</script>
